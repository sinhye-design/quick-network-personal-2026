<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>퀵네트워크</title>
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('fonts/PretendardVariable.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --primary: #07CA7F;
  --primary-light: rgba(7,202,127,0.15);
  --orange: #FF6F22;
  --orange-light: #FF9257;
  --orange-bg: rgba(255,111,34,0.15);
  --surface: #1A1A1A;
  --card: #262626;
  --card2: #2E2E2E;
  --card3: #383838;
  --text: #F5F5F5;
  --sub: #9A9A9A;
  --border: rgba(255,255,255,0.08);
  --radius: 14px;
  --danger: #FF4C4C;
}

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #111;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#app {
  width: 390px;
  min-height: 100vh;
  background: var(--surface);
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

@media (min-width: 430px) {
  body { align-items: center; padding: 24px 0; background: #0A0A0A; }
  #app {
    min-height: auto;
    height: 860px;
    border-radius: 44px;
    box-shadow: 0 0 0 10px #2C2C2E, 0 0 0 12px #3A3A3C, 0 30px 80px rgba(0,0,0,.85);
    overflow: hidden;
  }
}

.screen { display: none; width: 100%; flex: 1; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ── TOPBAR ── */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.topbar-title { font-size: 17px; font-weight: 700; flex: 1; text-align: center; }
.topbar-logo { font-size: 18px; font-weight: 900; color: var(--text); letter-spacing: -.5px; }
.back-btn, .icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text); font-size: 20px; padding: 4px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; flex-shrink: 0;
}

/* ── TOGGLE SWITCH ── */
.toggle-wrap { display: flex; align-items: center; gap: 0; margin-left: 8px; }
.toggle-switch {
  width: 46px; height: 26px; border-radius: 13px;
  background: #444; position: relative; cursor: pointer;
  transition: background .25s; flex-shrink: 0;
}
.toggle-switch.on { background: var(--orange); }
.toggle-switch::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px;
  transition: transform .25s; box-shadow: 0 1px 4px rgba(0,0,0,.3);
}
.toggle-switch.on::after { transform: translateX(20px); }

/* ── QR ICON BTN ── */
.qr-icon-btn {
  width: 36px; height: 36px; border-radius: 8px;
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 22px;
}

/* ── BOTTOM NAV (3 items) ── */
.bottom-nav {
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  flex-shrink: 0;
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 50;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; cursor: pointer; padding: 4px 0;
  background: none; border: none; color: var(--sub);
  font-family: inherit; transition: color .15s;
}
.nav-item.active { color: var(--primary); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; }
.nav-icon-wrap { position: relative; }
.nav-badge {
  position: absolute; top: -3px; right: -6px;
  background: var(--orange); color: #fff;
  font-size: 9px; font-weight: 700;
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* ── BUTTONS ── */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 15px; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  border: none; font-family: inherit;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(.98); opacity: .85; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { width: auto; padding: 9px 18px; font-size: 14px; border-radius: 20px; }
.btn-xs { width: auto; padding: 6px 12px; font-size: 13px; border-radius: 20px; }

/* ── FORMS ── */
.form-section { margin-bottom: 24px; }
.form-section-title {
  font-size: 11px; font-weight: 700; color: var(--sub);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
}
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
.field input, .field textarea {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  font-size: 15px; color: var(--text); background: var(--card);
  outline: none; transition: border .15s; font-family: inherit; color-scheme: dark;
}
.field input:focus, .field textarea:focus { border-color: var(--primary); }
.field textarea { resize: none; height: 80px; }
.field input::placeholder, .field textarea::placeholder { color: #555; }

/* ── TAG INPUT ── */
.tag-input-wrap {
  border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 10px;
  background: var(--card); display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 48px; cursor: text;
}
.tag-input-wrap:focus-within { border-color: var(--primary); }
.tag-chip {
  background: var(--primary-light); color: var(--primary);
  border-radius: 20px; padding: 4px 10px; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}
.tag-chip .rm { cursor: pointer; font-size: 15px; line-height: 1; }
.tag-input-wrap input {
  border: none; outline: none; font-size: 14px; min-width: 80px;
  flex: 1; padding: 2px 4px; background: transparent; color: var(--text); font-family: inherit;
}

/* ── AVATAR ── */
.avatar-row { display: flex; gap: 10px; flex-wrap: wrap; }
.avatar-opt {
  width: 48px; height: 48px; border-radius: 50%; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 3px solid transparent; background: var(--card2);
  transition: border .15s;
}
.avatar-opt.selected { border-color: var(--primary); }

/* ── CHIPS ── */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card2); color: var(--sub);
  border: 1.5px solid transparent; transition: all .15s; font-family: inherit;
}
.chip.selected { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
.chip.selected-orange { background: var(--orange-bg); color: var(--orange-light); border-color: var(--orange); }

/* ── TAGS ── */
.tag { background: var(--card2); color: var(--sub); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 500; }
.tag.primary { background: var(--primary-light); color: var(--primary); }
.tag.orange { background: var(--orange-bg); color: var(--orange-light); }

/* ── PURPOSE TAG ── */
.purpose-tag {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--card2); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600; color: var(--sub);
}
.purpose-tag .bm { color: var(--orange); font-size: 14px; }

/* ── CARD ── */
.info-card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); }

/* ── SCROLL ── */
.scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 16px 90px; }
.scroll-body::-webkit-scrollbar { display: none; }

/* ── DIVIDER ── */
.divider { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--sub); width: 100%; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-state .ei { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }
.empty-state small { font-size: 13px; display: block; margin-top: 6px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1F2937; color: #fff; padding: 12px 24px; border-radius: 24px;
  font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .3s, transform .3s;
  pointer-events: none; z-index: 1000; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════ */
/* LANDING                               */
/* ══════════════════════════════════════ */
.landing-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; gap: 28px; overflow-y: auto;
}
.logo-mark { font-size: 36px; font-weight: 900; color: var(--text); display: block; letter-spacing: -.5px; }
.logo-sub { font-size: 14px; color: var(--sub); margin-top: 6px; }
.landing-qr-box {
  width: 100%; background: var(--card); border-radius: 20px;
  padding: 24px; border: 1.5px solid var(--border); text-align: center;
}
.landing-qr-box .qr-icon { font-size: 56px; margin-bottom: 12px; }
.landing-qr-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.landing-qr-box p { font-size: 13px; color: var(--sub); margin-bottom: 20px; line-height: 1.6; }
.code-input-row { display: flex; gap: 8px; width: 100%; }
.code-input-row input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px 14px; font-size: 16px; color: var(--text);
  background: var(--card); outline: none; font-family: inherit; color-scheme: dark;
  text-transform: uppercase; letter-spacing: 3px; text-align: center; font-weight: 700;
}
.code-input-row input:focus { border-color: var(--primary); }

/* ══════════════════════════════════════ */
/* REGISTER                              */
/* ══════════════════════════════════════ */
.reg-progress {
  display: flex; gap: 4px; padding: 10px 16px;
  background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.prog-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background .3s; }
.prog-dot.done { background: var(--primary); }

/* ══════════════════════════════════════ */
/* HOME - REDESIGNED                     */
/* ══════════════════════════════════════ */
.home-header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 16px; flex-shrink: 0;
}
.home-toprow {
  display: flex; align-items: center; padding: 14px 0 12px;
  gap: 8px;
}
.home-toprow .app-name { font-size: 18px; font-weight: 900; color: var(--text); flex: 1; letter-spacing: -.3px; }

/* Tab bar */
.tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  margin: 0 -16px; padding: 0 16px;
}
.tab-item {
  padding: 10px 20px 10px 0; font-size: 15px; font-weight: 700;
  color: var(--sub); cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color .15s, border-color .15s;
  background: none; border-left: none; border-right: none; border-top: none;
  font-family: inherit;
}
.tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Filter row */
.filter-row-home {
  display: flex; align-items: center; padding: 10px 0;
  gap: 8px;
}
.filter-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: 1.5px solid var(--border); border-radius: 20px;
  padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--sub);
  cursor: pointer; font-family: inherit; transition: border-color .15s, color .15s;
}
.filter-btn.active { border-color: var(--orange); color: var(--orange-light); }
.filter-count {
  background: var(--orange); color: #fff; font-size: 10px; font-weight: 700;
  width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
}

/* QR tooltip banner */
.qr-banner {
  background: var(--primary); color: #fff;
  border-radius: 20px; padding: 7px 12px 7px 14px;
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.qr-banner .close { cursor: pointer; font-size: 16px; line-height: 1; opacity: .8; }

/* Toggle off overlay */
.toggle-off-tip {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(26,26,26,.92); border-radius: 12px;
  padding: 12px 20px; font-size: 14px; font-weight: 600;
  color: var(--text); text-align: center; line-height: 1.5;
  pointer-events: none; z-index: 5;
  white-space: nowrap;
}

/* list area */
.list-area {
  flex: 1; overflow-y: auto; padding: 10px 16px 90px;
  position: relative;
}
.list-area::-webkit-scrollbar { display: none; }
.list-area.blurred > * { filter: blur(5px); pointer-events: none; user-select: none; }

/* Participant card */
.p-card {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 10px; overflow: hidden;
  transition: border-color .2s;
}
.p-card.expanded { border-color: rgba(255,255,255,0.15); }
.p-card.requested { border-color: rgba(255,111,34,.3); }

.p-card-top {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 14px 0 14px; cursor: pointer;
}
.p-card-av {
  width: 44px; height: 44px; border-radius: 50%; font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative;
}
.p-card-info { flex: 1; min-width: 0; }
.p-card-name {
  font-size: 14px; font-weight: 700; margin-bottom: 0;
  display: flex; align-items: center; gap: 6px;
}
.p-card-arrow { color: var(--sub); font-size: 16px; flex-shrink: 0; transition: transform .2s; }
.p-card.expanded .p-card-arrow { transform: rotate(90deg); }

.p-card-tag-row { padding: 8px 14px 12px 14px; }

/* Expanded content */
.p-card-expand {
  display: none; padding: 0 14px 14px 14px;
  border-top: 1px solid var(--border); margin-top: 2px; padding-top: 14px;
}
.p-card.expanded .p-card-expand { display: block; }

.expand-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
.expand-av {
  width: 56px; height: 56px; border-radius: 50%; font-size: 30px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.expand-name { font-size: 16px; font-weight: 800; margin-bottom: 3px; }
.expand-meta { font-size: 12px; color: var(--sub); margin-bottom: 2px; }
.expand-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.expand-bottom {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 12px;
}
.expand-purpose { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600; color: var(--orange-light); }
.expand-purpose .bm { color: var(--orange); }

.net-request-btn {
  padding: 9px 18px; border-radius: 20px; background: var(--primary);
  border: none; font-size: 13px; font-weight: 700; color: #fff;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: opacity .15s, transform .1s;
}
.net-request-btn:active { transform: scale(.95); opacity: .85; }

.net-cancel-pill {
  display: inline-flex; align-items: center;
  background: rgba(255,76,76,.15); color: var(--danger);
  border: 1px solid rgba(255,76,76,.3); border-radius: 20px;
  padding: 5px 12px; font-size: 12px; font-weight: 700;
  margin-left: auto;
}

/* ── NETWORKING REQUEST MODAL ── */
.modal-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.7); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--card2); border-radius: 20px; padding: 28px 24px;
  width: 100%; text-align: center; border: 1px solid rgba(255,255,255,.1);
}
.modal-title { font-size: 18px; font-weight: 800; line-height: 1.4; margin-bottom: 10px; }
.modal-desc { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 10px; }
.modal-no {
  flex: 1; padding: 14px; border-radius: 12px; background: var(--card3);
  border: none; font-size: 15px; font-weight: 700; color: var(--text);
  cursor: pointer; font-family: inherit;
}
.modal-yes {
  flex: 1.5; padding: 14px; border-radius: 12px; background: var(--primary);
  border: none; font-size: 15px; font-weight: 700; color: #fff;
  cursor: pointer; font-family: inherit;
}

/* ══════════════════════════════════════ */
/* FILTER BOTTOM SHEET                   */
/* ══════════════════════════════════════ */
.sheet-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.6);
  z-index: 100; display: flex; flex-direction: column; justify-content: flex-end;
}
.sheet-overlay.hidden { display: none; }
.sheet {
  background: var(--card); border-radius: 24px 24px 0 0;
  max-height: 85%; display: flex; flex-direction: column;
}
.sheet-handle {
  width: 36px; height: 4px; background: var(--border); border-radius: 2px;
  margin: 12px auto 0;
}
.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; flex-shrink: 0;
}
.sheet-title { font-size: 17px; font-weight: 800; }
.sheet-reset { font-size: 14px; color: var(--sub); cursor: pointer; background: none; border: none; font-family: inherit; }
.sheet-body { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
.sheet-body::-webkit-scrollbar { display: none; }
.sheet-footer { padding: 12px 20px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); flex-shrink: 0; }

.filter-section { margin-bottom: 24px; }
.filter-section-title {
  font-size: 14px; font-weight: 800; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.filter-count-badge { font-size: 12px; color: var(--orange-light); font-weight: 700; }

/* Accordion */
.accordion-item {
  border-radius: 10px; background: var(--card2); margin-bottom: 6px; overflow: hidden;
}
.accordion-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; cursor: pointer; font-size: 14px; font-weight: 600;
}
.accordion-header .ac-left { display: flex; align-items: center; gap: 8px; }
.accordion-check {
  width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.accordion-check.checked { background: var(--primary); border-color: var(--primary); }
.accordion-check.checked::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 900; }
.accordion-arrow { color: var(--sub); font-size: 14px; transition: transform .2s; }
.accordion-item.open .accordion-arrow { transform: rotate(180deg); }
.accordion-body { display: none; padding: 4px 14px 12px; }
.accordion-item.open .accordion-body { display: flex; flex-wrap: wrap; gap: 6px; }

/* Range slider */
.range-wrap { padding: 8px 0 16px; }
.range-slider {
  -webkit-appearance: none; width: 100%; height: 4px;
  border-radius: 2px; background: var(--border); outline: none;
  background: linear-gradient(to right, var(--primary) 0%, var(--primary) 50%, var(--border) 50%);
}
.range-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary); cursor: pointer; border: 3px solid var(--card);
  box-shadow: 0 2px 6px rgba(0,0,0,.4);
}
.range-labels { display: flex; justify-content: space-between; margin-top: 8px; }
.range-label { font-size: 11px; color: var(--sub); text-align: center; flex: 1; }
.range-label.active { color: var(--primary); font-weight: 700; }

/* ══════════════════════════════════════ */
/* CHAT LIST / ROOM                      */
/* ══════════════════════════════════════ */
.chat-list-body { flex: 1; overflow-y: auto; padding-bottom: 80px; }
.chat-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.chat-item:active { background: var(--card); }
.chat-item-info { flex: 1; min-width: 0; }
.chat-item-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.chat-item-preview { font-size: 13px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-item-meta { text-align: right; flex-shrink: 0; }

      S.sessionCode = s.sessionCode||'DEMO';
      S.requestedIds = new Set(s.requestedIds||[]);
    }
  } catch(e){}
  if (!S.people.length) S.people = DUMMY.map(d=>({...d}));
  if (!Object.keys(S.chats).length) S.chats = JSON.parse(JSON.stringify(MOCK_CHATS));
}

function save() {
  localStorage.setItem('qnw1', JSON.stringify({
    myId:S.myId, people:S.people, chats:S.chats,
    sessionCode:S.sessionCode, requestedIds:[...S.requestedIds]
  }));
}

function startReg(editing) {
  S.regStep = 1; S.editingId = editing||null;
  if (editing) {
    const p = S.people.find(x=>x.id===editing);
    if (p) {
      S.regData = {name:p.name,role:p.role,company:p.company||'',bio:p.bio,email:p.email||'',link:p.link||''};
      rAvatar = p.avIdx||0; rTags=[...(p.tags||[])]; rPurpose=p.purpose||null; rWant=p.want||null;
    }
  } else {
    S.regData={}; rAvatar=0; rTags=[]; rPurpose=null; rWant=null;
  }
  buildRegStep(); showScreen('register');
}

function buildRegStep() {
  const step = S.regStep;
  [1,2,3].forEach(i => document.getElementById('pd'+i).classList.toggle('done',i<=step));
  const titles=['기본 정보','관심사 & 목적','오늘의 상태'];
  document.getElementById('reg-title').textContent = S.editingId?'프로필 수정':titles[step-1];
  const body = document.getElementById('reg-body');

  if (step===1) {
    body.innerHTML=`
      <div class="form-section">
        <div class="form-section-title">아바타</div>
        <div class="avatar-row" id="av-row"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">기본 정보</div>
        <div class="field"><label>이름 / 닉네임 *</label><input id="r-name" type="text" placeholder="닉네임글자수_123" value="${esc(S.regData.name||'')}"></div>
        <div class="field"><label>직업 / 역할 *</label><input id="r-role" type="text" placeholder="프론트엔드 개발자" value="${esc(S.regData.role||'')}"></div>
        <div class="field"><label>소속</label><input id="r-company" type="text" placeholder="스타트업" value="${esc(S.regData.company||'')}"></div>
        <div class="field"><label>한줄 소개 *</label><textarea id="r-bio" placeholder="간단하게 자신을 소개해 주세요">${esc(S.regData.bio||'')}</textarea></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">연락처</div>
        <div class="field"><label>이메일</label><input id="r-email" type="email" placeholder="hello@example.com" value="${esc(S.regData.email||'')}"></div>
        <div class="field"><label>링크드인 / 링크</label><input id="r-link" type="url" placeholder="https://" value="${esc(S.regData.link||'')}"></div>
      </div>
      <button class="btn btn-primary" onclick="regStep1Next()">다음 →</button>
    `;
    buildAvatarPicker();
  } else if (step===2) {
    body.innerHTML=`
      <div class="form-section">
        <div class="form-section-title">관심사 태그 <span style="color:var(--sub);font-weight:400;font-size:11px">(입력 후 Enter)</span></div>
        <div class="tag-input-wrap" id="tag-wrap"><input id="tag-in" type="text" placeholder="React, AI, 스타트업…"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">네트워킹 참여 목적</div>
        <div class="chip-row" id="purpose-row"></div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" style="flex:1" onclick="S.regStep=1;buildRegStep()">← 이전</button>
        <button class="btn btn-primary" style="flex:2" onclick="regStep2Next()">다음 →</button>
      </div>
    `;
    buildTagInput(); buildChips('purpose-row',PURPOSES_LIST,()=>rPurpose,v=>rPurpose=v);
  } else {
    body.innerHTML=`
      <div class="form-section">
        <div class="form-section-title">오늘의 상태 메시지</div>
        <p style="font-size:13px;color:var(--sub);margin-bottom:14px;line-height:1.6">지금 무엇을 찾고 있나요? 다른 참여자에게 표시돼요.</p>
        <div class="field"><input id="r-status" type="text" placeholder="예: CTO 찾고 있어요" value="${esc(S.regData.status||'')}" maxlength="30"></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px" id="status-sugg"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">카드 미리보기</div>
        <div class="p-card" style="margin-bottom:0">
          <div class="p-card-top" style="cursor:default;padding-bottom:12px">
            <div class="p-card-av" style="background:${AV_COLORS[rAvatar%AV_COLORS.length]}">${AVATARS[rAvatar].em}</div>
            <div class="p-card-info">
              <div class="p-card-name">${esc(S.regData.name||'닉네임')}</div>
            </div>
          </div>
          <div class="p-card-tag-row" style="padding-top:0">
            <span class="purpose-tag"><span class="bm">🔖</span>${PURPOSES_LIST.find(p=>p.id===rPurpose)?.label||'목적 미선택'}</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" style="flex:1" onclick="S.regStep=2;buildRegStep()">← 이전</button>
        <button class="btn btn-primary" style="flex:2" onclick="submitReg()">🎉 ${S.editingId?'수정 완료':'등록 완료'}</button>
      </div>
    `;
    const suggs=['CTO 찾고 있어요','Series A 준비 중','협업 파트너 구해요','멘토 찾습니다','오픈 마인드'];
    const sg=document.getElementById('status-sugg');
    suggs.forEach(s=>{
      const b=document.createElement('button');
      b.className='chip';b.style.fontSize='12px';b.textContent=s;
      b.onclick=()=>{document.getElementById('r-status').value=s;};
      sg.appendChild(b);
    });
  }
  body.scrollTop=0;
}

function buildAvatarPicker() {
  const row=document.getElementById('av-row');
  AVATARS.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='avatar-opt'+(i===rAvatar?' selected':'');
    d.textContent=a.em;
    d.style.background=AV_COLORS[i%AV_COLORS.length];
    d.onclick=()=>{rAvatar=i;document.querySelectorAll('.avatar-opt').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');};
    row.appendChild(d);
  });
}

function buildTagInput() {
  renderTagChips();
  const inp=document.getElementById('tag-in');
  inp.onkeydown=e=>{
    if(e.key==='Enter'||e.key===','){
      e.preventDefault();
      const v=inp.value.trim().replace(/,$/,'');
      if(v&&!rTags.includes(v)){rTags.push(v);renderTagChips();}
      inp.value='';
    }
    if(e.key==='Backspace'&&!inp.value&&rTags.length){rTags.pop();renderTagChips();}
  };
  document.getElementById('tag-wrap').onclick=e=>{if(e.target.id==='tag-wrap')inp.focus();};
}

function renderTagChips() {
  const wrap=document.getElementById('tag-wrap');
  const inp=document.getElementById('tag-in');
  if(!wrap)return;
  wrap.innerHTML='';
  rTags.forEach((t,i)=>{
    const chip=document.createElement('span');
    chip.className='tag-chip';
    chip.innerHTML=`${esc(t)}<span class="rm">×</span>`;
    chip.querySelector('.rm').onclick=()=>{rTags.splice(i,1);renderTagChips();};
    wrap.appendChild(chip);
  });
  wrap.appendChild(inp);
}

function buildChips(cid,items,getVal,setVal) {
  const c=document.getElementById(cid);
  items.forEach(item=>{
    const btn=document.createElement('button');
    btn.className='chip'+(getVal()===item.id?' selected':'');
    btn.innerHTML=`${item.icon} ${item.label}`;
    btn.onclick=()=>{setVal(item.id);c.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');};
    c.appendChild(btn);
  });
}

function regStep1Next() {
  const name=document.getElementById('r-name').value.trim();
  const role=document.getElementById('r-role').value.trim();
  const bio=document.getElementById('r-bio').value.trim();
  if(!name||!role||!bio){toast('이름, 역할, 소개는 필수예요');return;}
  S.regData={name,role,bio,company:document.getElementById('r-company').value.trim(),email:document.getElementById('r-email').value.trim(),link:document.getElementById('r-link').value.trim()};
  S.regStep=2;buildRegStep();
}

function regStep2Next() {
  if(!rPurpose){toast('네트워킹 목적을 선택해 주세요');return;}
  S.regStep=3;buildRegStep();
}

function submitReg() {
  const status=document.getElementById('r-status').value.trim();
  const person={id:S.editingId||('u'+Date.now()),avIdx:rAvatar,...S.regData,tags:[...rTags],purpose:rPurpose,want:rWant,status};
  if(S.editingId){
    const idx=S.people.findIndex(p=>p.id===S.editingId);
    if(idx!==-1)S.people[idx]=person;
    toast('프로필이 수정됐어요 ✓');
  }else{
    S.people.push(person);S.myId=person.id;
    toast('등록 완료! 환영해요 🎉');
  }
  S.editingId=null;save();
  showScreen('home');renderHomeList();
}

function toggleNetworking() {
  S.networkingOn = !S.networkingOn;
  const toggle = document.getElementById('main-toggle');
  toggle.classList.toggle('on', S.networkingOn);
  const listArea = document.getElementById('list-area');
  const tip = document.getElementById('toggle-off-tip');
  const qrBanner = document.getElementById('qr-banner');

  if (S.networkingOn) {
    listArea.classList.remove('blurred');
    tip.style.display = 'none';
    if (!S.qrBannerDismissed) qrBanner.style.display = 'block';
    toast('네트워킹에 참여했어요!');
  } else {
    listArea.classList.add('blurred');
    tip.style.display = 'block';
    qrBanner.style.display = 'none';
    toast('네트워킹 참여가 중단됐어요');
  }
}

function dismissQRBanner() {
  S.qrBannerDismissed = true;
  document.getElementById('qr-banner').style.display = 'none';
}

function switchHomeTab(tab) {
  S.homeTab = tab;
  document.getElementById('tab-1v1').classList.toggle('active', tab==='1v1');
  document.getElementById('tab-group').classList.toggle('active', tab==='group');
  renderHomeList();
}

function renderHomeList() {
  const el = document.getElementById('home-list');
  if (!el) return;
  const list = S.people.filter(p => p.id !== S.myId);
  if (!list.length) {
    el.innerHTML=`<div class="empty-state"><div class="ei">👥</div><p>아직 참여자가 없어요</p></div>`;
    return;
  }
  el.innerHTML='';
  list.forEach(p => {
    const avData = AVATARS[p.avIdx||0];
    const avColor = AV_COLORS[(p.avIdx||0)%AV_COLORS.length];
    const purposeObj = PURPOSES_LIST.find(x=>x.id===p.purpose);
    const isRequested = S.requestedIds.has(p.id);
    const isExpanded = S.expandedId === p.id;

    const card = document.createElement('div');
    card.className = 'p-card'+(isExpanded?' expanded':'')+(isRequested?' requested':'');
    card.id = 'pcard-'+p.id;
    card.innerHTML = `
      <div class="p-card-top" onclick="toggleCard('${p.id}')">
        <div class="p-card-av" style="background:${avColor}">${avData.em}</div>
        <div class="p-card-info">
          <div class="p-card-name">${esc(p.name)}</div>
        </div>
        ${isRequested
          ? `<span class="net-cancel-pill" onclick="cancelRequest('${p.id}',event)">네트워킹 취소</span>`
          : `<span class="p-card-arrow">›</span>`
        }
      </div>
      <div class="p-card-tag-row">
        ${purposeObj ? `<span class="purpose-tag"><span class="bm">🔖</span>${esc(purposeObj.label)}</span>` : ''}
      </div>
      <div class="p-card-expand">
        <div class="expand-header">
          <div class="expand-av" style="background:${avColor}">${avData.em}</div>
          <div>
            <div class="expand-name">${esc(p.name)}</div>
            <div class="expand-meta">${esc(p.role||'')}${p.career?` | ${p.career}`:''}${p.company?`<br>${esc(p.company)}`:''}</div>
          </div>
        </div>
        <div class="expand-chips">
          ${(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
        </div>
        <div class="expand-bottom">
          <div class="expand-purpose"><span class="bm">🔖</span>${purposeObj?esc(purposeObj.label):''}</div>
          ${!isRequested
            ? `<button class="net-request-btn" onclick="openNetModal('${p.id}',event)">네트워킹 신청</button>`
            : `<button class="net-request-btn" style="background:var(--card3);color:var(--sub)" onclick="cancelRequest('${p.id}',event)">신청 취소</button>`
          }
        </div>
      </div>
    `;
    el.appendChild(card);
  });

  // toggle off state
  const listArea = document.getElementById('list-area');
  const tip = document.getElementById('toggle-off-tip');
  if (S.networkingOn) {
    listArea.classList.remove('blurred');
    tip.style.display = 'none';
  } else {
    listArea.classList.add('blurred');
    tip.style.display = 'block';
  }
}

function toggleCard(pid) {
  if (!S.networkingOn) { toast('스위치를 켜야 참여할 수 있어요'); return; }
  S.expandedId = S.expandedId === pid ? null : pid;
  renderHomeList();
}

function openNetModal(pid, e) {
  if (e) e.stopPropagation();
  const p = S.people.find(x=>x.id===pid);
  if (!p) return;
  S.pendingRequestId = pid;
  document.getElementById('modal-title').innerHTML = `<b>${esc(p.name)}</b>님에게<br>네트워킹을 신청할까요?`;
  document.getElementById('net-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('net-modal').classList.add('hidden');
  S.pendingRequestId = null;
}

function confirmNetRequest() {
  if (!S.pendingRequestId) return;
  S.requestedIds.add(S.pendingRequestId);
  save();
  closeModal();
  renderHomeList();
  toast('네트워킹을 신청했어요!');
  // simulate accept after 2s
  const pid = S.pendingRequestId || [...S.requestedIds].slice(-1)[0];
  setTimeout(() => {
    createChatIfNeeded(pid);
    toast('매칭됐어요! 채팅을 시작해 보세요 🎉');
    document.getElementById('notif-badge').style.display = 'flex';
    document.getElementById('notif-badge').textContent = '1';
  }, 2500);
}

function cancelRequest(pid, e) {
  if (e) e.stopPropagation();
  S.requestedIds.delete(pid);
  save(); renderHomeList();
  toast('네트워킹 신청을 취소했어요');
}

function toggleAccordion(id) {

function toggleJobChip(btn) { btn.classList.toggle('selected'); }
function toggleInterestChip(btn) { btn.classList.toggle('selected'); }

function updateRangeLabel(el) {
  const labels = el.closest('.range-wrap').querySelectorAll('.range-label');

function resetFilter() {
  buildFilterSheet();

      ${me.bio?`<div class="profile-row"><span class="pr-icon">💬</span><div><div class="pr-label">소개</div><div class="pr-val">${esc(me.bio)}</div></div></div>`:''}
      ${me.email?`<div class="profile-row"><span class="pr-icon">✉️</span><div><div class="pr-label">이메일</div><div class="pr-val">${esc(me.email)}</div></div></div>`:''}
      ${me.company?`<div class="profile-row"><span class="pr-icon">🏢</span><div><div class="pr-label">소속</div><div class="pr-val">${esc(me.company)}</div></div></div>`:''}
    </div>
    <button class="btn btn-outline" onclick="startReg('${me.id}')">✏️ 프로필 수정</button>
  `;
}

// ═══════════════════════════════════
// NOTIFICATION
// ═══════════════════════════════════
function renderNotif() {
  document.getElementById('notif-badge').style.display='none';
  const body=document.getElementById('notif-body');
  if(!MOCK_NOTIFS.length){body.innerHTML=`<div class="empty-state"><div class="ei">🔔</div><p>아직 알림이 없어요</p></div>`;return;}
  body.innerHTML='';
  MOCK_NOTIFS.forEach(n=>{
    const item=document.createElement('div');
    item.className='notif-item';
    item.innerHTML=`
      <div class="notif-dot${n.read?' read':''}"></div>
      <div style="flex:1">
        <div class="notif-text">${esc(n.text)}</div>
        <div class="notif-time">${n.time}</div>
      </div>
      ${n.chatId?`<button class="btn btn-primary btn-xs" onclick="openChatRoom('${n.chatId}')">채팅 열기</button>`:''}
    `;
    body.appendChild(item);
    n.read=true;
  });
}

// ═══════════════════════════════════
// MYPAGE
// ═══════════════════════════════════
function renderMypage() {
  const body=document.getElementById('mypage-body');
  const me=S.people.find(p=>p.id===S.myId);
  const av=me?AVATARS[me.avIdx||0]:AVATARS[0];
  const avc=me?AV_COLORS[(me.avIdx||0)%AV_COLORS.length]:'#333';
  body.innerHTML=`
    <div class="mypage-profile-section">
      <div class="mypage-av" style="background:${avc}">${av.em}</div>
      <div class="mypage-info">
        <div class="mypage-name">${me?esc(me.name):'프로필 미등록'}</div>
        <div class="mypage-role">${me?esc(me.role):''}</div>
        ${me?.status?`<div class="mypage-status">"${esc(me.status)}"</div>`:''}
      </div>
    </div>
    <div class="mypage-menu">
      <div class="menu-section-title">내 정보</div>
      <div class="menu-item" onclick="${me?`startReg('${me.id}')`:'startReg()'}">
        <span class="menu-icon">👤</span>
        <span class="menu-label">내 정보 확인/수정</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="goQR()">
        <span class="menu-icon">🪪</span>
        <span class="menu-label">내 명함 미리보기</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-section-title">온라인 명함 보관함</div>
      <div class="menu-item" onclick="showScreen('chatroom');renderMsgs()">
        <span class="menu-icon">💬</span>
        <span class="menu-label">채팅 목록</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="toast('저장된 명함이 없어요')">
        <span class="menu-icon">📁</span>
        <span class="menu-label">저장된 네트워킹 명함</span>
        <span class="menu-arrow">›</span>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════
// CHAT
// ═══════════════════════════════════
function createChatIfNeeded(pid) {
  if (!S.chats[pid]) {
    S.chats[pid]={partnerId:pid,messages:[{id:'m'+Date.now(),from:'system',text:'네트워킹이 연결됐어요! 자유롭게 대화해 보세요 🎉',time:nowTime()}],unread:0};
    save();
  }
}

function openChatRoom(pid) {
  const partner=S.people.find(p=>p.id===pid);
  if(!partner)return;
  S.currentChat=pid;
  if(S.chats[pid])S.chats[pid].unread=0;
  document.getElementById('chatroom-title').textContent=partner.name;
  showScreen('chatroom');
  renderMsgs();
  requestAnimationFrame(()=>{const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;});
}

function renderMsgs() {
  const el=document.getElementById('chat-messages');
  if(!el||!S.currentChat)return;
  const chat=S.chats[S.currentChat];
  if(!chat)return;
  el.innerHTML='';
  chat.messages.forEach(m=>{
    if(m.from==='system'){const d=document.createElement('div');d.className='msg-system';d.textContent=m.text;el.appendChild(d);return;}
    if(m.type==='card'){
      const p2=S.people.find(x=>x.id===m.cardId);
      const row=document.createElement('div');
      row.className='msg-row'+(m.from==='me'?' me':'');
      if(m.from!=='me'){const av=S.people.find(x=>x.id===S.currentChat);const avEl=document.createElement('div');avEl.className='msg-av';avEl.textContent=av?AVATARS[av.avIdx||0].em:'?';row.appendChild(avEl);}
      const bubble=document.createElement('div');
      bubble.className='chat-card-bubble';
      bubble.innerHTML=`<div style="width:36px;height:36px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${AV_COLORS[(p2?.avIdx||0)%AV_COLORS.length]}">${p2?AVATARS[p2.avIdx||0].em:'?'}</div><div><div class="cc-name">${esc(p2?.name||'?')}</div><div class="cc-role">${esc(p2?.role||'')}</div></div>`;
      bubble.onclick=()=>openDetail(m.cardId,'chatroom');
      row.appendChild(bubble);el.appendChild(row);return;
    }
    const row=document.createElement('div');
    row.className='msg-row'+(m.from==='me'?' me':'');
    if(m.from!=='me'){const av=S.people.find(x=>x.id===S.currentChat);const avEl=document.createElement('div');avEl.className='msg-av';avEl.textContent=av?AVATARS[av.avIdx||0].em:'?';row.appendChild(avEl);}
    const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.textContent=m.text;
    const tEl=document.createElement('span');tEl.className='msg-time';tEl.textContent=m.time;
    row.appendChild(bubble);row.appendChild(tEl);el.appendChild(row);
  });
}

function sendMsg() {
  const ta=document.getElementById('chat-ta');
  const text=ta.value.trim();
  if(!text||!S.currentChat)return;
  const chat=S.chats[S.currentChat];if(!chat)return;
  chat.messages.push({id:'m'+Date.now(),from:'me',text,time:nowTime()});
  ta.value='';ta.style.height='';save();renderMsgs();
  const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;
  setTimeout(()=>{
    const replies=['네, 맞아요!','오, 흥미롭네요 👀','좋아요! 연락 드릴게요 😊','저도 비슷한 고민이에요.','같이 한번 해봐요!'];
    chat.messages.push({id:'m'+Date.now(),from:S.currentChat,text:replies[Math.floor(Math.random()*replies.length)],time:nowTime()});
    save();renderMsgs();if(el)el.scrollTop=el.scrollHeight;
  },1000+Math.random()*800);
}

function shareCard() {
  if(!S.myId||!S.currentChat)return;
  const chat=S.chats[S.currentChat];if(!chat)return;
  chat.messages.push({id:'m'+Date.now(),from:'me',type:'card',cardId:S.myId,time:nowTime()});
  save();renderMsgs();
  const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;
  toast('명함을 공유했어요 🪪');
}

function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function backFromChat(){showScreen('home');renderHomeList();}
function openDetailFromChat(){if(S.currentChat)openDetail(S.currentChat,'chatroom');}

// ═══════════════════════════════════
// DETAIL
// ═══════════════════════════════════
function openDetail(id,from) {
  const p=S.people.find(x=>x.id===id);if(!p)return;
  S.prevScreen=from||'home';
  const av=AVATARS[p.avIdx||0];
  const avc=AV_COLORS[(p.avIdx||0)%AV_COLORS.length];
  const isMe=p.id===S.myId;
  document.getElementById('d-av').textContent=av.em;
  document.getElementById('d-av').style.background='rgba(255,255,255,.2)';
  document.getElementById('d-name').textContent=p.name;
  document.getElementById('d-role').textContent=p.role;
  document.getElementById('detail-title').textContent=p.name;
  const db=document.getElementById('d-body');
  const pObj=PURPOSES_LIST.find(x=>x.id===p.purpose);
  db.innerHTML=`
    ${p.bio?`<div class="info-card" style="padding:16px"><div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">소개</div><p style="font-size:14px;line-height:1.6">${esc(p.bio)}</p></div>`:''}
    ${p.tags?.length?`<div class="info-card" style="padding:16px"><div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">관심사</div><div style="display:flex;flex-wrap:wrap;gap:6px">${p.tags.map(t=>`<span class="tag primary">${esc(t)}</span>`).join('')}</div></div>`:''}
    ${p.status?`<div class="info-card" style="padding:16px"><div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">오늘의 상태</div><p style="font-size:15px;font-weight:600;color:var(--orange-light)">"${esc(p.status)}"</p></div>`:''}
    ${pObj?`<div class="info-card" style="padding:16px"><div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">참여 목적</div><span class="purpose-tag"><span class="bm">🔖</span>${esc(pObj.label)}</span></div>`:''}
    ${(p.email||p.link||p.company)?`<div class="info-card" style="padding:16px"><div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">연락처</div>${p.email?`<a href="mailto:${p.email}" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);font-size:14px"><span>✉️</span><span style="flex:1">${esc(p.email)}</span><span style="color:var(--sub)">›</span></a>`:''}${p.company?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;font-size:14px"><span>🏢</span><span>${esc(p.company)}</span></div>`:''}</div>`:''}
    ${!isMe?`<div style="display:flex;gap:10px">
      <button class="btn btn-outline" style="flex:1" onclick="openNetModal('${p.id}')">🤝 네트워킹 신청</button>
      <button class="btn btn-primary" style="flex:1" onclick="chatFromDetail('${p.id}')">💬 채팅</button>
    </div>`:`<button class="btn btn-outline" onclick="startReg('${p.id}')">✏️ 프로필 수정</button>`}
  `;
  showScreen('detail');
}

function chatFromDetail(id) {
  createChatIfNeeded(id); closeDetail();
  setTimeout(()=>openChatRoom(id),50);
}

function closeDetail() {
  const prev=S.prevScreen||'home';S.prevScreen=null;
  if(prev==='chatroom')showScreen('chatroom');
  else showScreen('home');
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function nowTime(){const d=new Date();return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
function init() {
  load();
  if (S.myId) {
    showScreen('home');
    renderHomeList();
  } else {
    showScreen('landing');
  }
}

init();
</script>
</body>
</html>
